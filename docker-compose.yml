services:
  postgres:
    image: postgres:17-alpine
    container_name: trader_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-trader_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - trader_network

  redis:
    image: redis:7-alpine
    container_name: trader_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - trader_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: trader_api
    env_file:
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-trader_dev_password}@postgres:5432/${POSTGRES_DB:-trader_db}
      REDIS_URL: redis://redis:6379
      FASTAPI_BASE_URL: http://langchain:8000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - trader_network

  langchain:
    build:
      context: ./apps/langchain-service
      dockerfile: Dockerfile
    container_name: trader_langchain
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ./apps/langchain-service/.env
    environment:
      ASSETLENS_API_BASE_URL: http://api:4000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - trader_network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: trader_web
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ./apps/web/.env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - trader_network

networks:
  trader_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
