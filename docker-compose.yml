services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: trader_postgres
    # Only pass DB credentials into Postgres (not the whole repo .env — avoids leaking app keys into the DB container).
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-trader_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trader_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: trader_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trader_network

  # API Service
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: trader_api
    env_file:
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Override host-only URLs from apps/api/.env so the API reaches sibling containers by Compose service name.
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-trader_dev_password}@postgres:5432/${POSTGRES_DB:-trader_db}
      REDIS_URL: redis://redis:6379
      FASTAPI_BASE_URL: http://langchain:8000
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/prisma:/app/prisma
    networks:
      - trader_network
    command: npm run dev:docker

  # LangChain Service
  langchain:
    build:
      context: ./apps/langchain-service
      dockerfile: Dockerfile
    container_name: trader_langchain
    depends_on:
      api:
        condition: service_started
    env_file:
      - ./apps/langchain-service/.env
    environment:
      # app/config.py reads ASSETLENS_API_BASE_URL (not localhost — that would be the LangChain container itself).
      ASSETLENS_API_BASE_URL: http://api:4000
    ports:
      - "8000:8000"
    volumes:
      - ./apps/langchain-service/app:/app/app
    networks:
      - trader_network

  # Web Service
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: trader_web
    depends_on:
      - api
      - langchain
    env_file:
      - ./apps/web/.env
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/app:/app/app
      - ./apps/web/public:/app/public
    networks:
      - trader_network

networks:
  trader_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
